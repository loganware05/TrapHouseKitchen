# Render Blueprint for TrapHouse Kitchen
# Postgres is defined below; DATABASE_URL on the API is wired via fromDatabase.
# Set FRONTEND_URL (API) and VITE_API_URL (static build) in the dashboard after first deploy — see docs/deployment/render.md.

databases:
  - name: traphousekitchen-db
    region: virginia
    plan: basic-256mb
    databaseName: traphousekitchen
    user: traphousekitchen

services:
  # Backend API Service
  - type: web
    name: traphousekitchen-api
    runtime: node
    region: virginia
    plan: starter
    # Use migrate deploy in production (see backend/prisma/migrations). Fresh DB: deploy applies init migration.
    # Adopting an existing DB that was created with db push: run `prisma migrate resolve` once, then deploy.
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd backend && npm run prisma:seed || true && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: traphousekitchen-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: TrapHouse Kitchen <orders@traphousekitchen.com>
      - key: CHEF_EMAIL
        sync: false
      - key: REVIEW_WINDOW_DAYS
        value: 30
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: AI_MAX_TOKENS
        value: "1024"
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: traphousekitchen-web
    runtime: static
    region: virginia
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
